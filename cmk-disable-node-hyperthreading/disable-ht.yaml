---
apiVersion: v1
kind: ConfigMap
metadata:
  name: disable-ht-script
  namespace: kube-system
data:
  run.sh: |
    #!/bin/bash
    set -euo pipefail

    SMT_CONTROL=/sys/devices/system/cpu/smt/control

    if [ ! -f "$SMT_CONTROL" ]; then
      echo "SMT control file not found; node may not support hyperthreading. Nothing to do."
      exec sleep infinity
    fi

    current=$(tr -d '[:space:]' < "$SMT_CONTROL")
    if [ "$current" = "off" ]; then
      echo "Hyperthreading is already off on $NODE_NAME. Nothing to do."
      exec sleep infinity
    fi

    echo "SMT state on $NODE_NAME is '$current' — disabling hyperthreading..."
    echo off > "$SMT_CONTROL"

    echo "Restarting kubelet (entering host mount namespace via PID 1)..."
    nsenter -t 1 -m -- systemctl restart kubelet
    echo "Kubelet restarted. Sleeping...."
    exec sleep infinity
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: disable-ht
  namespace: kube-system
  labels:
    app: disable-ht
spec:
  selector:
    matchLabels:
      app: disable-ht
  template:
    metadata:
      labels:
        app: disable-ht
    spec:
      hostPID: true  # required for nsenter -t 1
      #To restrict this to certain nodes, list applicable labels and values under nodeSelector
      #nodeSelector:
      #  label1: value1
      #  label2: value2
      #  label3: value3
      containers:
      - name: disable-ht
        image: ghcr.io/datadoc24/disable-ht:latest
        command: ["/bin/bash", "/scripts/run.sh"]
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        securityContext:
          privileged: true
          runAsUser: 0
        volumeMounts:
        - name: sys
          mountPath: /sys
        - name: scripts
          mountPath: /scripts
      volumes:
      - name: sys
        hostPath:
          path: /sys
      - name: scripts
        configMap:
          name: disable-ht-script
          defaultMode: 0755
      terminationGracePeriodSeconds: 30
