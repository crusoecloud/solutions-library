---
apiVersion: v1
kind: ConfigMap
metadata:
  name: torchtitan-llama3-8b-config
data:
  llama3_8B_pvc.toml: |
    [job]
    dump_folder = "/outputs"
    description = "Llama 3.1 8B training on Crusoe B300"

    [profiling]
    enable_profiling = true
    save_traces_folder = "profile_trace"
    profile_freq = 100

    [metrics]
    log_freq = 10
    enable_tensorboard = true
    save_tb_folder = "/outputs/tb"

    [model]
    name = "llama3"
    flavor = "8B"
    # Tokenizer assets are built into the Docker image.
    hf_assets_path = "/workspace/torchtitan/assets/hf/Llama-3.1-8B"

    [optimizer]
    name = "AdamW"
    lr = 3e-4
    eps = 1e-8

    [lr_scheduler]
    warmup_steps = 200

    [training]
    local_batch_size = 4
    seq_len = 8192
    max_norm = 1.0
    steps = 1000
    dataset = "c4"

    [parallelism]
    data_parallel_replicate_degree = 1
    # -1 means shard across all 16 GPUs (16-way FSDP across both nodes).
    data_parallel_shard_degree = -1
    tensor_parallel_degree = 1
    pipeline_parallel_degree = 1
    context_parallel_degree = 1

    [checkpoint]
    enable = true
    folder = "/outputs/checkpoint"
    interval = 500
    last_save_model_only = true
    export_dtype = "float32"
    # Chasnge async_mode to "disabled" if async checkpointing causes OOM crashes
    async_mode = "async"

    [compile]
    enable = false
    components = ["model", "loss"]

    [activation_checkpoint]
    mode = "none"
    selective_ac_option = "op"

    [quantize.linear.float8]
    enable_fsdp_float8_all_gather = false
    precompute_float8_dynamic_scale_for_fsdp = false
    filter_fqns = ["output"]

---
apiVersion: kubeflow.org/v1
kind: PyTorchJob
metadata:
  name: torchtitan-llama3-8b
spec:
  pytorchReplicaSpecs:
    Master:
      replicas: 1
      restartPolicy: OnFailure
      template:
        spec:
          nodeSelector:
            crusoe.ai/accelerator: "nvidia-b300-288gb-sxm-ib"
          containers:
          - name: pytorch
            image: docker.io/abesharphpe/torchtitan-llama3-8b:v9
            imagePullPolicy: IfNotPresent
            securityContext:
              privileged: true
            workingDir: /workspace/torchtitan
            command:
            - /bin/bash
            - -c
            - |
              torchrun \
                --nproc_per_node=8 \
                --nnodes=2 \
                --node_rank=${RANK} \
                --rdzv_endpoint=${MASTER_ADDR}:${MASTER_PORT} \
                --rdzv_backend=c10d \
                -m torchtitan.train \
                --job.config_file /config/llama3_8B_pvc.toml
            env:
            - name: PYTORCH_ALLOC_CONF
              value: "expandable_segments:True"
            - name: NCCL_DEBUG
              value: "INFO"
            - name: NCCL_SOCKET_IFNAME
              value: "eth0"
            - name: NCCL_IB_DISABLE
              value: "0"
            - name: NCCL_IB_HCA
              value: "mlx5_5,mlx5_6,mlx5_7,mlx5_8,mlx5_9,mlx5_10,mlx5_11,mlx5_12"
            - name: NCCL_IB_GID_INDEX
              value: "3"
            - name: NCCL_IB_TIMEOUT
              value: "22"
            - name: NCCL_SOCKET_NTHREADS
              value: "4"
            - name: NCCL_NSOCKS_PERTHREAD
              value: "2"
            - name: NCCL_TOPO_FILE
              value: /opt/nccl_topo/b300-288gb-sxm-ib-cloud-hypervisor.xml
            - name: NCCL_BUFFSIZE
              value: "2097152"
            - name: LD_LIBRARY_PATH
              value: "/usr/local/cuda/lib64:/opt/hpcx/nccl_rdma_sharp_plugin/lib:/opt/hpcx/ucc/lib/ucc:/opt/hpcx/ucc/lib:/opt/hpcx/ucx/lib/ucx:/opt/hpcx/ucx/lib:/opt/hpcx/sharp/lib:/opt/hpcx/hcoll/lib:/opt/hpcx/ompi/lib:/usr/local/nvidia/lib"
            resources:
              limits:
                nvidia.com/gpu: "8"
              requests:
                nvidia.com/gpu: "8"
            volumeMounts:
            - name: c4-dataset
              mountPath: /data
            - name: config
              mountPath: /config
            - name: outputs
              mountPath: /outputs
            - name: dshm
              mountPath: /dev/shm
            - name: nccl-topo
              mountPath: /opt/nccl_topo
            - name: infiniband
              mountPath: /dev/infiniband
          volumes:
          - name: c4-dataset
            persistentVolumeClaim:
              claimName: data-disk
          - name: config
            configMap:
              name: torchtitan-llama3-8b-config
          - name: outputs
            # Replace with a PVC to persist checkpoints and TensorBoard logs
            # beyond the lifetime of the pod.
            emptyDir: {}
          - name: dshm
            emptyDir:
              medium: Memory
              sizeLimit: "20Gi"
          - name: nccl-topo
            hostPath:
              path: /etc/crusoe/nccl_topo
              type: Directory
          - name: infiniband
            hostPath:
              path: /dev/infiniband
              type: Directory

    Worker:
      replicas: 1
      restartPolicy: OnFailure
      template:
        spec:
          nodeSelector:
            crusoe.ai/accelerator: "nvidia-b300-288gb-sxm-ib"
          containers:
          - name: pytorch
            image: docker.io/abesharphpe/torchtitan-llama3-8b:v9
            imagePullPolicy: IfNotPresent
            securityContext:
              privileged: true
            workingDir: /workspace/torchtitan
            command:
            - /bin/bash
            - -c
            - |
              torchrun \
                --nproc_per_node=8 \
                --nnodes=2 \
                --node_rank=${RANK} \
                --rdzv_endpoint=${MASTER_ADDR}:${MASTER_PORT} \
                --rdzv_backend=c10d \
                -m torchtitan.train \
                --job.config_file /config/llama3_8B_pvc.toml
            env:
            - name: PYTORCH_ALLOC_CONF
              value: "expandable_segments:True"
            - name: NCCL_DEBUG
              value: "INFO"
            - name: NCCL_SOCKET_IFNAME
              value: "eth0"
            - name: NCCL_IB_DISABLE
              value: "0"
            - name: NCCL_IB_HCA
              value: "mlx5_5,mlx5_6,mlx5_7,mlx5_8,mlx5_9,mlx5_10,mlx5_11,mlx5_12"
            - name: NCCL_IB_GID_INDEX
              value: "3"
            - name: NCCL_IB_TIMEOUT
              value: "22"
            - name: NCCL_SOCKET_NTHREADS
              value: "4"
            - name: NCCL_NSOCKS_PERTHREAD
              value: "2"
            - name: NCCL_BUFFSIZE
              value: "2097152"
            - name: NCCL_TOPO_FILE
              value: /opt/nccl_topo/b300-288gb-sxm-ib-cloud-hypervisor.xml
            - name: LD_LIBRARY_PATH
              value: "/usr/local/cuda/lib64:/opt/hpcx/nccl_rdma_sharp_plugin/lib:/opt/hpcx/ucc/lib/ucc:/opt/hpcx/ucc/lib:/opt/hpcx/ucx/lib/ucx:/opt/hpcx/ucx/lib:/opt/hpcx/sharp/lib:/opt/hpcx/hcoll/lib:/opt/hpcx/ompi/lib:/usr/local/nvidia/lib"
            resources:
              limits:
                nvidia.com/gpu: "8"
              requests:
                nvidia.com/gpu: "8"
            volumeMounts:
            - name: c4-dataset
              mountPath: /data
            - name: config
              mountPath: /config
            - name: outputs
              mountPath: /outputs
            - name: dshm
              mountPath: /dev/shm
            - name: nccl-topo
              mountPath: /opt/nccl_topo
            - name: infiniband
              mountPath: /dev/infiniband
          volumes:
          - name: c4-dataset
            persistentVolumeClaim:
              claimName: data-disk
          - name: config
            configMap:
              name: torchtitan-llama3-8b-config
          - name: nccl-topo
            hostPath:
              path: /etc/crusoe/nccl_topo
              type: Directory
          - name: infiniband
            hostPath:
              path: /dev/infiniband
              type: Directory
          - name: outputs
            emptyDir: {}
          - name: dshm
            emptyDir:
              medium: Memory
              sizeLimit: "20Gi"
