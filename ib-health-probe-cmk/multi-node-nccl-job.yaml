# Multi-node NCCL all_reduce_perf — cluster integration test.
# Pairs with ib-probe-job.yaml (per-node unit test).
#
# Rendered via envsubst — apply-multinode.sh does this for you, or set the vars
# yourself and pipe through envsubst. Parameters:
#
#   POOL_LABEL           crusoe.ai/nodepool.name value
#   NCCL_TOPO_FILE       filename in /etc/crusoe/nccl_topo/, SKU-specific
#   WORKER_REPLICAS      node count (4, 64, 340, ...)
#   TOTAL_GPUS           = WORKER_REPLICAS * 8
#   PROBE_IMAGE          NCCL test image
#   NCCL_IB_LIST         HCA allowlist with port suffix, comma-separated
#                          B200:  mlx5_5:1,...,mlx5_12:1
#                          H200:  mlx5_1:1,...,mlx5_8:1
#                        Pinned identically on NCCL_IB_HCA and UCX_NET_DEVICES —
#                        without the UCX pin, teardown hangs when UCX auto-picks
#                        a non-compute HCA.
#   NCCL_NITERS          iterations per size (default 20 — drop to 5 at >100
#                        nodes for a quick smoke test)
#   NCCL_BOOTSTRAP_TIMEOUT_SEC  default 120; bump at >100 nodes (try 600 at 340)
---
apiVersion: kubeflow.org/v2beta1
kind: MPIJob
metadata:
  name: nccl-integration
spec:
  slotsPerWorker: 8
  runPolicy:
    cleanPodPolicy: Running
  mpiReplicaSpecs:
    Launcher:
      replicas: 1
      template:
        spec:
          restartPolicy: OnFailure
          volumes:
            - name: nccl-topo
              hostPath:
                path: /etc/crusoe/nccl_topo
                type: Directory
          containers:
            - name: launcher
              image: ${PROBE_IMAGE}
              imagePullPolicy: IfNotPresent
              securityContext:
                capabilities:
                  add: ["IPC_LOCK"]
              env:
                - name: NCCL_TOPO_FILE
                  value: /opt/nccl_topo/${NCCL_TOPO_FILE}
              volumeMounts:
                - { name: nccl-topo, mountPath: /opt/nccl_topo }
              command:
                - mpirun
                - --allow-run-as-root
                - --tag-output
                - -np
                - "${TOTAL_GPUS}"
                - -N
                - "8"
                - -bind-to
                - none
                - -map-by
                - slot
                - -mca
                - coll_hcoll_enable
                - "0"
                # NCCL transport — IB HCA allowlist (UCX gets the same list so
                # it doesn't auto-pick a non-compute endpoint and hang teardown)
                - -x
                - NCCL_IB_HCA=${NCCL_IB_LIST}
                - -x
                - UCX_NET_DEVICES=${NCCL_IB_LIST}
                - -x
                - NCCL_IB_PCI_RELAXED_ORDERING=1
                - -x
                - NCCL_IB_SPLIT_DATA_ON_QPS=0
                - -x
                - NCCL_IB_QPS_PER_CONNECTION=2
                - -x
                - NCCL_IB_MERGE_VFS=0
                - -x
                - NCCL_IB_SL=1
                - -x
                - NCCL_NVLS_ENABLE=1
                - -x
                - NCCL_DEBUG=WARN
                - -x
                - NCCL_BOOTSTRAP_TIMEOUT=${NCCL_BOOTSTRAP_TIMEOUT_SEC}
                - -x
                - NCCL_TOPO_FILE
                - -x
                - PATH
                - -x
                - LD_LIBRARY_PATH
                # Do NOT propagate UCX_TLS via -x. The Crusoe convention
                # "self,sm,cuda_copy" excludes inter-node transports (rc/dc/ud).
                # When set only on the launcher's env (not -x'd to ranks) it's
                # harmless because the launcher doesn't run a rank. When -x'd,
                # all ranks fail with "Destination is unreachable" on ucp_ep_create.
                # UCX_NET_DEVICES pin (above) is the only UCX env var we need.
                - /opt/nccl-tests/build/all_reduce_perf
                - -b
                - "2G"
                - -e
                - "32G"
                - -f
                - "2"
                - -g
                - "1"
                - -c
                - "1"
                - -n
                - "${NCCL_NITERS}"
    Worker:
      replicas: ${WORKER_REPLICAS}
      template:
        spec:
          restartPolicy: OnFailure
          runtimeClassName: nvidia
          nodeSelector:
            crusoe.ai/nodepool.name: ${POOL_LABEL}
          volumes:
            - name: dshm
              emptyDir:
                medium: Memory
                sizeLimit: 64Gi
            - name: nccl-topo
              hostPath:
                path: /etc/crusoe/nccl_topo
                type: Directory
          containers:
            - name: worker
              image: ${PROBE_IMAGE}
              imagePullPolicy: IfNotPresent
              securityContext:
                capabilities:
                  add: ["IPC_LOCK"]
              # No env block: mpirun -x propagates NCCL/UCX vars from launcher
              # to each rank. Workers just need the mounts + IPC_LOCK + GPU/HCA.
              volumeMounts:
                - { mountPath: /dev/shm, name: dshm }
                - { name: nccl-topo, mountPath: /opt/nccl_topo }
              resources:
                limits:
                  nvidia.com/gpu: 8
                  nvidia.com/hostdev: 8
                  memory: 128000Mi
                requests:
                  nvidia.com/gpu: 8
                  nvidia.com/hostdev: 8
                  memory: 128000Mi
