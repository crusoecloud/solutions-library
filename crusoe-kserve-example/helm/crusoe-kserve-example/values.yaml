# HuggingFace API token (required)
hfToken: ""

# Namespace for LLM workloads
namespace: kserve-test

# vLLM image
image: vllm/vllm-openai:latest

# KServe v0.19.0 hardens LLM pods (runAsNonRoot + readOnlyRootFilesystem) for
# non-root images. The default vllm/vllm-openai image runs as root and writes to
# the container filesystem, so relax the context for the basic/large/multi-node
# profiles. (Disaggregated uses the non-root llm-d image and inherits KServe's
# hardened context instead.)
containerSecurityContext:
  runAsNonRoot: false
  runAsUser: 0
  readOnlyRootFilesystem: false

# Persistent storage for model weights (required for models >100GB)
modelStorage:
  enabled: false
  size: 200Gi

# Basic: single-GPU LLM serving (e.g., Qwen2.5-0.5B-Instruct)
basic:
  enabled: true
  model:
    uri: hf://Qwen/Qwen2.5-0.5B-Instruct
    name: qwen
  resources:
    limits:
      gpu: "1"
      cpu: "2"
      memory: 6Gi
    requests:
      gpu: "1"
      cpu: "1"
      memory: 4Gi
  nodeSelector:
    crusoe.ai/accelerator: nvidia-a100-80gb

# Large: multi-GPU single-node LLM serving (e.g., Qwen2.5-72B-Instruct on 8x H100, TP=8)
large:
  enabled: false
  model:
    uri: hf://Qwen/Qwen2.5-72B-Instruct
    name: qwen
  resources:
    limits:
      gpu: "8"
      cpu: "64"
      memory: 512Gi
    requests:
      gpu: "8"
      cpu: "32"
      memory: 256Gi
  nodeSelector:
    crusoe.ai/accelerator: nvidia-h100-80gb-sxm-ib

# Multi-node: tensor + pipeline parallelism (e.g., Qwen2.5-72B-Instruct)
multiNode:
  enabled: false
  model:
    uri: hf://Qwen/Qwen2.5-72B-Instruct
    name: qwen
  replicas: 2
  parallelism:
    tensor: 8
    data: 16
    dataLocal: 8
  resources:
    limits:
      gpu: "8"
      cpu: "64"
      memory: 512Gi
    requests:
      gpu: "8"
      cpu: "32"
      memory: 256Gi
  nodeSelector:
    crusoe.ai/accelerator: nvidia-h100-80gb-sxm-ib

# Disaggregated prefill-decode serving.
# Requires KServe v0.19.0+ (its scheduler preset wires the NIXL KV connector; the
# v0.17.0 scheduler crashes on disaggregated configs).
disaggregated:
  enabled: false
  # NIXL-capable vLLM image matching KServe v0.19.0's scheduler preset. The default
  # vllm/vllm-openai image lacks the NIXL KV connector needed for prefill/decode.
  image: ghcr.io/llm-d/llm-d-cuda:v0.6.0
  model:
    uri: hf://Qwen/Qwen2.5-72B-Instruct
    name: qwen
  decode:
    replicas: 2
    # Crusoe's GPU driver ships libcuda.so.1 under /usr/lib/x86_64-linux-gnu, but the
    # UBI-based llm-d image links against /usr/lib64 during vLLM's Triton compile.
    # Point the linker at the driver path so the engine initializes.
    extraEnv:
      - name: LIBRARY_PATH
        value: /usr/lib/x86_64-linux-gnu
    parallelism:
      tensor: 8
      data: 16
      dataLocal: 8
    resources:
      limits:
        gpu: "8"
        cpu: "64"
        memory: 512Gi
      requests:
        gpu: "8"
        cpu: "32"
        memory: 256Gi
    nodeSelector:
      crusoe.ai/accelerator: nvidia-a100-80gb-sxm-ib
  prefill:
    replicas: 1
    extraEnv:
      - name: LIBRARY_PATH
        value: /usr/lib/x86_64-linux-gnu
    resources:
      limits:
        gpu: "8"
        cpu: "64"
        memory: 512Gi
      requests:
        gpu: "8"
        cpu: "32"
        memory: 256Gi
    nodeSelector:
      crusoe.ai/accelerator: nvidia-h100-80gb-sxm-ib

# AMD MI300X deployment modes
amd:
  image: vllm/vllm-openai-rocm:latest

  # Basic: single-GPU LLM serving on AMD MI300X
  basic:
    enabled: false
    model:
      uri: hf://Qwen/Qwen2.5-0.5B-Instruct
      name: qwen
    resources:
      limits:
        gpu: "1"
        cpu: "2"
        memory: 6Gi
      requests:
        gpu: "1"
        cpu: "1"
        memory: 4Gi
    nodeSelector:
      crusoe.ai/accelerator: amd-mi300x-192gb-ib

  # Large: multi-GPU single-node LLM serving on AMD MI300X (e.g., MiniMax-M2 on 8x MI300X, TP=8)
  large:
    enabled: false
    model:
      uri: hf://MiniMaxAI/MiniMax-M2
      name: minimax
    resources:
      limits:
        gpu: "8"
        cpu: "64"
        memory: 512Gi
      requests:
        gpu: "8"
        cpu: "32"
        memory: 256Gi
    nodeSelector:
      crusoe.ai/accelerator: amd-mi300x-192gb-ib

  # Multi-node: tensor + pipeline parallelism on AMD MI300X
  multiNode:
    enabled: false
    model:
      uri: hf://MiniMaxAI/MiniMax-M2
      name: minimax
    replicas: 2
    parallelism:
      tensor: 8
      data: 16
      dataLocal: 8
    resources:
      limits:
        gpu: "8"
        cpu: "64"
        memory: 512Gi
      requests:
        gpu: "8"
        cpu: "32"
        memory: 256Gi
    nodeSelector:
      crusoe.ai/accelerator: amd-mi300x-192gb-ib

  # MI355X (gfx950): large single-node MoE serving (e.g., Qwen3-235B on 8x MI355X, TP=8+EP).
  # Differs from amd.large (MI300X) in three ways that matter:
  #   1. A gfx950-specific ROCm image — the default vllm-openai-rocm lacks MI355X kernels.
  #   2. A ReadWriteMany shared disk (fs.csi.crusoe.ai) instead of RWO, so a rolling update
  #      can bring the new pod up on an idle node before the old one exits — zero-downtime,
  #      no RWO Multi-Attach stall, no single-GPU-node rollout deadlock.
  #   3. A long startupProbe budget — the first-run AITER MoE compile for a 235B model far
  #      exceeds KServe's default 10-min startup window and would otherwise probe-loop.
  # vLLM args (TP/EP/tool-calling) are set via Makefile --set flags (see deploy-amd-mi355x).
  mi355x:
    enabled: false
    image: rocm/vllm:rocm7.13.0_gfx950-dcgpu_ubuntu24.04_py3.13_pytorch_2.10.0_vllm_0.19.1
    model:
      uri: hf://Qwen/Qwen3-235B-A22B-Instruct-2507-FP8
      name: qwen3
    sharedStorage:
      enabled: true
      size: 1Ti          # fs.csi.crusoe.ai minimum is 1 TiB (model weights are ~235GB)
    startupProbe:
      periodSeconds: 15
      failureThreshold: 200   # ~50 min for the AITER MoE kernel compile to complete + cache
    resources:
      limits:
        gpu: "8"
        cpu: "64"
        memory: 1024Gi
      requests:
        gpu: "8"
        cpu: "16"
        memory: 128Gi
    nodeSelector:
      crusoe.ai/accelerator: amd-mi355x-288gb-roce
