# HuggingFace API token (required)
hfToken: ""

# Namespace for LLM workloads
namespace: kserve-test

# vLLM image
image: vllm/vllm-openai:latest

# Persistent storage for model weights (required for models >100GB)
modelStorage:
  enabled: false
  size: 200Gi

# Basic: single-GPU LLM serving (e.g., Qwen2.5-0.5B-Instruct)
basic:
  enabled: true
  model:
    uri: hf://Qwen/Qwen2.5-0.5B-Instruct
    name: qwen
  resources:
    limits:
      gpu: "1"
      cpu: "2"
      memory: 6Gi
    requests:
      gpu: "1"
      cpu: "1"
      memory: 4Gi
  nodeSelector:
    crusoe.ai/accelerator: nvidia-h100-80gb-sxm-ib

# Large: multi-GPU single-node LLM serving (e.g., Qwen2.5-72B-Instruct on 8x H100, TP=8)
large:
  enabled: false
  model:
    uri: hf://Qwen/Qwen2.5-72B-Instruct
    name: qwen
  resources:
    limits:
      gpu: "8"
      cpu: "64"
      memory: 512Gi
    requests:
      gpu: "8"
      cpu: "32"
      memory: 256Gi
  nodeSelector:
    crusoe.ai/accelerator: nvidia-h100-80gb-sxm-ib

# Multi-node: tensor + pipeline parallelism (e.g., Qwen2.5-72B-Instruct)
multiNode:
  enabled: false
  model:
    uri: hf://Qwen/Qwen2.5-72B-Instruct
    name: qwen
  replicas: 2
  parallelism:
    tensor: 8
    data: 16
    dataLocal: 8
  resources:
    limits:
      gpu: "8"
      cpu: "64"
      memory: 512Gi
    requests:
      gpu: "8"
      cpu: "32"
      memory: 256Gi
  nodeSelector:
    crusoe.ai/accelerator: nvidia-h100-80gb-sxm-ib

# Disaggregated prefill-decode serving
disaggregated:
  enabled: false
  model:
    uri: hf://Qwen/Qwen2.5-72B-Instruct
    name: qwen
  decode:
    replicas: 2
    parallelism:
      tensor: 8
      data: 16
      dataLocal: 8
    resources:
      limits:
        gpu: "8"
        cpu: "64"
        memory: 512Gi
      requests:
        gpu: "8"
        cpu: "32"
        memory: 256Gi
    nodeSelector:
      crusoe.ai/accelerator: nvidia-a100-80gb-sxm-ib
  prefill:
    replicas: 1
    resources:
      limits:
        gpu: "8"
        cpu: "64"
        memory: 512Gi
      requests:
        gpu: "8"
        cpu: "32"
        memory: 256Gi
    nodeSelector:
      crusoe.ai/accelerator: nvidia-h100-80gb-sxm-ib

# AMD MI300X deployment modes
amd:
  image: vllm/vllm-openai-rocm:latest

  # Basic: single-GPU LLM serving on AMD MI300X
  basic:
    enabled: false
    model:
      uri: hf://Qwen/Qwen2.5-0.5B-Instruct
      name: qwen
    resources:
      limits:
        gpu: "1"
        cpu: "2"
        memory: 6Gi
      requests:
        gpu: "1"
        cpu: "1"
        memory: 4Gi
    nodeSelector:
      crusoe.ai/accelerator: amd-mi300x-192gb-ib

  # Large: multi-GPU single-node LLM serving on AMD MI300X (e.g., MiniMax-M2 on 8x MI300X, TP=8)
  large:
    enabled: false
    model:
      uri: hf://MiniMaxAI/MiniMax-M2
      name: minimax
    resources:
      limits:
        gpu: "8"
        cpu: "64"
        memory: 512Gi
      requests:
        gpu: "8"
        cpu: "32"
        memory: 256Gi
    nodeSelector:
      crusoe.ai/accelerator: amd-mi300x-192gb-ib

  # Multi-node: tensor + pipeline parallelism on AMD MI300X
  multiNode:
    enabled: false
    model:
      uri: hf://MiniMaxAI/MiniMax-M2
      name: minimax
    replicas: 2
    parallelism:
      tensor: 8
      data: 16
      dataLocal: 8
    resources:
      limits:
        gpu: "8"
        cpu: "64"
        memory: 512Gi
      requests:
        gpu: "8"
        cpu: "32"
        memory: 256Gi
    nodeSelector:
      crusoe.ai/accelerator: amd-mi300x-192gb-ib
