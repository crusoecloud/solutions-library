---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: amazon-access
  namespace: default
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::<YOUR AWS ACCOUNT ID>:role/<ROLE NAME>
---
apiVersion: v1
kind: Pod
metadata:
  name: amazon-s3-test
  namespace: default
spec:
  serviceAccountName: amazon-access
  restartPolicy: Never
  containers:
  - name: aws-cli
    image: amazon/aws-cli:latest
    command:
    - /bin/sh
    - -c
    - |
      set -e
      BUCKET="cmk-oidc-test-$(date +%s)"
      echo "==> Creating bucket: s3://$BUCKET"
      aws s3 mb s3://$BUCKET --region us-east-1
      echo "==> Writing test data"
      echo "Hello from amazon-access OIDC test pod (cluster: poccluster6)" | \
        aws s3 cp - s3://$BUCKET/hello.txt
      echo "==> Listing bucket contents"
      aws s3 ls s3://$BUCKET
      echo "==> Done"
    env:
    - name: AWS_ROLE_ARN
      value: arn:aws:iam::<YOUR AWS ACCOUNT ID>:role/<ROLE NAME>
    - name: AWS_WEB_IDENTITY_TOKEN_FILE
      value: /var/run/secrets/sts/token
    - name: AWS_REGION
      value: us-east-1
    - name: AWS_DEFAULT_REGION
      value: us-east-1
    volumeMounts:
    - name: aws-token
      mountPath: /var/run/secrets/sts
      readOnly: true
  volumes:
  - name: aws-token
    projected:
      sources:
      - serviceAccountToken:
          path: token
          expirationSeconds: 86400
          audience: sts.amazonaws.com
