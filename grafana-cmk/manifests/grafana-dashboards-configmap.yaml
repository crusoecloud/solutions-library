          "title": "DCGM Health Failures (Last 24h)",
          "transformations": [
            {
              "id": "labelsToFields",
              "options": {
                "mode": "columns"
              }
            }
          ],
          "type": "table"
        },
        {
          "id": 6,
          "type": "row",
          "title": "GPU Health Indicators \u2014 Slow Node Detection",
          "gridPos": {
            "x": 0,
            "y": 20,
            "w": 24,
            "h": 1
          },
          "collapsed": false,
