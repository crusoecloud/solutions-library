          "title": "Local Link Integrity Errors",
          "description": "Local HCA-side link-integrity errors. Often the first signal that a node's IB cable / port is degrading. \u00b7 Window is fixed at [1h] because the Watch Agent's IB scrape cadence is ~19 min on B200 / ~4.5 min on H100; shorter windows would render mostly NaN. The reading is a trailing-hour average.",
          "datasource": {
            "type": "prometheus",
            "uid": "crusoe-metrics"
          },
          "gridPos": {
            "x": 20,
            "y": 4,
            "w": 4,
            "h": 4
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              }
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "crusoe-metrics"
              },
              "expr": "(sum(increase(crusoe_ib_local_link_integrity_errors{cluster_id=~\"$cluster\"}[1h]))) or vector(0)",
              "instant": true,
              "legendFormat": "__auto"
            }
          ]
        },
        {
          "id": 13,
          "type": "timeseries",
          "title": "Per-Node Aggregate RX Bandwidth",
          "description": "Per-node aggregate RX bandwidth (sum across HCAs). \u00b7 Window is fixed at [1h] because the Watch Agent's IB scrape cadence is ~19 min on B200 / ~4.5 min on H100; shorter windows would render mostly NaN. The reading is a trailing-hour average.",
          "datasource": {
            "type": "prometheus",
            "uid": "crusoe-metrics"
          },
          "gridPos": {
            "x": 0,
            "y": 8,
            "w": 12,
            "h": 8
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "custom": {
                "fillOpacity": 10
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "crusoe-metrics"
              },
              "expr": "sum by (vm_name) (rate(crusoe_ib_port_throughput_rx{cluster_id=~\"$cluster\"}[1h])) / 8",
              "legendFormat": "{{vm_name}}"
            }
          ]
        },
        {
          "id": 14,
          "type": "timeseries",
          "title": "Per-Node Aggregate TX Bandwidth",
          "description": "Per-node aggregate TX bandwidth (sum across HCAs). \u00b7 Window is fixed at [1h] because the Watch Agent's IB scrape cadence is ~19 min on B200 / ~4.5 min on H100; shorter windows would render mostly NaN. The reading is a trailing-hour average.",
          "datasource": {
            "type": "prometheus",
            "uid": "crusoe-metrics"
          },
          "gridPos": {
            "x": 12,
            "y": 8,
            "w": 12,
            "h": 8
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "custom": {
                "fillOpacity": 10
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "crusoe-metrics"
              },
              "expr": "sum by (vm_name) (rate(crusoe_ib_port_throughput_tx{cluster_id=~\"$cluster\"}[1h])) / 8",
              "legendFormat": "{{vm_name}}"
            }
          ]
        },
        {
          "id": 15,
          "type": "timeseries",
          "title": "Per-Node RX Packets/s",
          "description": "Per-node aggregate RX packet rate (sum across HCAs). Pair with the BW panel above to spot small-packet floods. \u00b7 Window is fixed at [1h] because the Watch Agent's IB scrape cadence is ~19 min on B200 / ~4.5 min on H100; shorter windows would render mostly NaN. The reading is a trailing-hour average.",
          "datasource": {
            "type": "prometheus",
            "uid": "crusoe-metrics"
          },
          "gridPos": {
            "x": 0,
            "y": 16,
            "w": 12,
            "h": 8
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "pps",
              "custom": {
                "fillOpacity": 10
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "crusoe-metrics"
              },
              "expr": "sum by (vm_name) (rate(crusoe_ib_port_packets_rx{cluster_id=~\"$cluster\"}[1h]))",
              "legendFormat": "{{vm_name}}"
            }
          ]
        },
        {
          "id": 16,
          "type": "timeseries",
          "title": "Per-Node TX Packets/s",
          "description": "Per-node aggregate TX packet rate (sum across HCAs). \u00b7 Window is fixed at [1h] because the Watch Agent's IB scrape cadence is ~19 min on B200 / ~4.5 min on H100; shorter windows would render mostly NaN. The reading is a trailing-hour average.",
          "datasource": {
            "type": "prometheus",
            "uid": "crusoe-metrics"
          },
          "gridPos": {
            "x": 12,
            "y": 16,
            "w": 12,
            "h": 8
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "pps",
              "custom": {
                "fillOpacity": 10
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "crusoe-metrics"
              },
              "expr": "sum by (vm_name) (rate(crusoe_ib_port_packets_tx{cluster_id=~\"$cluster\"}[1h]))",
              "legendFormat": "{{vm_name}}"
            }
          ]
        },
        {
          "id": 17,
          "type": "timeseries",
          "title": "RX Bandwidth Utilization % (per node)",
          "description": "Per-node aggregate RX utilization as % of total line rate. NOTE: line_rate label reports gig_bit_per_sec=128 on HCAs whose ibstat rate is 400 (NDR), so the denominator is off by ~3\u00d7. Treat as relative not absolute. \u00b7 Window is fixed at [1h] because the Watch Agent's IB scrape cadence is ~19 min on B200 / ~4.5 min on H100; shorter windows would render mostly NaN. The reading is a trailing-hour average.",
          "datasource": {
            "type": "prometheus",
            "uid": "crusoe-metrics"
          },
          "gridPos": {
            "x": 0,
            "y": 24,
            "w": 12,
            "h": 8
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "custom": {
                "fillOpacity": 10
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "crusoe-metrics"
              },
              "expr": "sum by (vm_name) (rate(crusoe_ib_port_throughput_rx{cluster_id=~\"$cluster\"}[1h])) / 1e9 / sum by (vm_name) (last_over_time(crusoe_ib_port_line_rate{cluster_id=~\"$cluster\"}[1h])) * 100",
              "legendFormat": "{{vm_name}}"
            }
          ]
        },
        {
          "id": 18,
          "type": "timeseries",
          "title": "RX Errors Rate (per node)",
          "description": "Per-node RX error rate (events/sec). \u00b7 Window is fixed at [1h] because the Watch Agent's IB scrape cadence is ~19 min on B200 / ~4.5 min on H100; shorter windows would render mostly NaN. The reading is a trailing-hour average.",
          "datasource": {
            "type": "prometheus",
            "uid": "crusoe-metrics"
          },
          "gridPos": {
            "x": 12,
            "y": 24,
            "w": 12,
            "h": 8
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "fillOpacity": 10
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "crusoe-metrics"
              },
              "expr": "sum by (vm_name) (rate(crusoe_ib_port_error_rx{cluster_id=~\"$cluster\"}[1h]))",
              "legendFormat": "{{vm_name}}"
            }
          ]
        },
        {
          "id": 19,
          "type": "timeseries",
          "title": "TX Wait (Back-pressure, per node)",
          "description": "Per-node TX-wait increment rate \u2014 indicates congestion or flow control. Rising values mean transmitter is waiting for credits. \u00b7 Window is fixed at [1h] because the Watch Agent's IB scrape cadence is ~19 min on B200 / ~4.5 min on H100; shorter windows would render mostly NaN. The reading is a trailing-hour average.",
          "datasource": {
            "type": "prometheus",
            "uid": "crusoe-metrics"
          },
          "gridPos": {
            "x": 0,
            "y": 32,
            "w": 12,
            "h": 8
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "fillOpacity": 10
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "crusoe-metrics"
              },
              "expr": "sum by (vm_name) (rate(crusoe_ib_port_tx_wait{cluster_id=~\"$cluster\"}[1h]))",
              "legendFormat": "{{vm_name}}"
            }
          ]
        },
        {
          "id": 20,
          "type": "bargauge",
          "title": "Top 10 Nodes by Combined RX+TX",
          "description": "Top 10 nodes by combined RX+TX bandwidth right now. \u00b7 Window is fixed at [1h] because the Watch Agent's IB scrape cadence is ~19 min on B200 / ~4.5 min on H100; shorter windows would render mostly NaN. The reading is a trailing-hour average.",
          "datasource": {
            "type": "prometheus",
            "uid": "crusoe-metrics"
          },
          "gridPos": {
            "x": 12,
            "y": 32,
            "w": 12,
            "h": 8
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "orientation": "horizontal",
            "displayMode": "gradient",
            "showUnfilled": true
          },
          "fieldConfig": {
            "defaults": {
              "unit": "Bps"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "crusoe-metrics"
              },
              "expr": "topk(10, sum by (vm_name) (rate(crusoe_ib_port_throughput_rx{cluster_id=~\"$cluster\"}[1h]) + rate(crusoe_ib_port_throughput_tx{cluster_id=~\"$cluster\"}[1h])) / 8)",
              "instant": true,
              "legendFormat": "{{vm_name}}"
            }
          ]
        }
      ]
    }
  dcgm-xid-errors.json: |
    {
      "__inputs": [
        {
          "name": "DS_PROMETHEUS",
          "label": "Crusoe Metrics",
          "description": "Crusoe Metrics Prometheus-compatible endpoint",
          "type": "datasource",
          "pluginId": "prometheus",
          "pluginName": "Prometheus"
        }
      ],
      "__elements": {},
      "__requires": [
        {"type": "grafana", "id": "grafana", "name": "Grafana", "version": "11.0.0"},
        {"type": "datasource", "id": "prometheus", "name": "Prometheus", "version": "1.0.0"},
        {"type": "panel", "id": "stat", "name": "Stat", "version": ""},
        {"type": "panel", "id": "timeseries", "name": "Time series", "version": ""},
        {"type": "panel", "id": "table", "name": "Table", "version": ""}
      ],
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {"type": "grafana", "uid": "-- Grafana --"},
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "description": "DCGM Xid errors and GPU health check failures across the cluster. Xid errors indicate GPU hardware or driver issues — see https://docs.nvidia.com/deploy/xid-errors/ for error code reference. Data sourced from Crusoe Metrics (Watch Agent provides DCGM metrics; no separate DCGM exporter installation is required).",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [
        {
          "asDropdown": false,
          "icon": "arrow-left",
          "includeVars": false,
          "keepTime": true,
          "tags": ["crusoe", "gpu"],
          "targetBlank": false,
          "title": "Cluster GPU Overview",
          "tooltip": "",
          "type": "dashboards",
          "url": ""
        }
      ],
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "crusoe-metrics"},
          "description": "Total Xid errors recorded across all GPUs in the last 24 hours. Any non-zero value warrants investigation.\n\nFor Xid error code meanings see: https://docs.nvidia.com/deploy/xid-errors/",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [
                {"options": {"0": {"color": "green", "index": 0, "text": "0 — Clean"}}, "type": "value"}
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "red", "value": 1}
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "id": 1,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["sum"], "fields": "", "values": false},
            "textMode": "auto",
            "wideLayout": true
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "crusoe-metrics"},
              "expr": "sum(increase(DCGM_FI_DEV_XID_ERRORS[24h]))",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "title": "Total Xid Errors (Last 24h)",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "crusoe-metrics"},
          "description": "Total ECC double-bit errors in the last 24 hours. DCGM_FI_DEV_ECC_DBE_VOL_TOTAL counts volatile (since-reset) double-bit errors. Persistent non-zero values indicate failing GPU memory.",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [
                {"options": {"0": {"color": "green", "index": 0, "text": "0 — Clean"}}, "type": "value"}
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 1},
                  {"color": "red", "value": 10}
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
          "id": 2,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["sum"], "fields": "", "values": false},
            "textMode": "auto",
            "wideLayout": true
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "crusoe-metrics"},
              "expr": "sum(increase(DCGM_FI_DEV_ECC_DBE_VOL_TOTAL[24h]))",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "title": "Total ECC Errors (Last 24h)",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "crusoe-metrics"},
          "description": "Xid error rate per node over time. A sudden spike typically indicates a driver crash, hardware fault, or workload-induced GPU reset.\n\nFor Xid code reference: https://docs.nvidia.com/deploy/xid-errors/",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "bars",
                "fillOpacity": 80,
                "gradientMode": "none",
                "hideFrom": {"legend": false, "tooltip": false, "viz": false},
                "insertNulls": false,
                "lineInterpolation": "linear",
                "lineWidth": 1,
                "pointSize": 5,
                "scaleDistribution": {"type": "linear"},
                "showPoints": "never",
                "spanNulls": true,
                "stacking": {"group": "A", "mode": "normal"},
                "thresholdsStyle": {"mode": "off"}
              },
              "mappings": [],
              "min": 0,
              "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}]},
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 4},
          "id": 3,
          "options": {
            "legend": {
              "calcs": ["sum"],
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "crusoe-metrics"},
              "expr": "sum by (node) (increase(DCGM_FI_DEV_XID_ERRORS[5m]))",
              "legendFormat": "{{node}}",
              "refId": "A"
            }
          ],
          "title": "Xid Error Rate by Node",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "crusoe-metrics"},
          "description": "Recent Xid errors grouped by node, GPU, and Xid error code. For Xid code meanings see: https://docs.nvidia.com/deploy/xid-errors/\n\nNote: the xid_id label name may differ — check the actual label names with the scrape discovery curl in the Troubleshooting section if this panel shows no data.",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "custom": {
                "align": "auto",
                "cellOptions": {"type": "auto"},
                "inspect": false
              },
              "mappings": [],
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}
            },
            "overrides": [
              {
                "matcher": {"id": "byName", "options": "Value"},
                "properties": [
                  {"id": "displayName", "value": "Error Count"},
                  {
                    "id": "custom.cellOptions",
                    "value": {"mode": "basic", "type": "color-background"}
                  },
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        {"color": "green", "value": null},
                        {"color": "red", "value": 1}
                      ]
                    }
                  }
                ]
              }
            ]
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12},
          "id": 4,
          "options": {
            "cellHeight": "sm",
            "footer": {
              "countRows": false,
              "fields": "",
              "reducer": ["sum"],
              "show": false
            },
            "showHeader": true,
            "sortBy": [{"desc": true, "displayName": "Error Count"}]
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "crusoe-metrics"},
              "expr": "sum by (node, gpu, xid_id) (increase(DCGM_FI_DEV_XID_ERRORS[24h])) > 0",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "title": "Xid Errors by Node / GPU / Code (Last 24h)",
          "transformations": [
            {
              "id": "labelsToFields",
              "options": {"mode": "columns"}
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": {"Time": true},
                "indexByName": {"node": 0, "gpu": 1, "xid_id": 2, "Value": 3},
                "renameByName": {}
              }
            }
          ],
          "type": "table"
        },
        {
          "datasource": {"type": "prometheus", "uid": "crusoe-metrics"},
          "description": "DCGM GPU health failures: ECC double-bit errors and clock throttle events per node/GPU in the last 24 hours. DCGM_FI_DEV_ECC_DBE_VOL_TOTAL is the volatile double-bit ECC error counter. DCGM_FI_DEV_CLOCK_THROTTLE_REASONS is a bitmask — any non-zero increase indicates throttling events.",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "custom": {
                "align": "auto",
                "cellOptions": {"type": "auto"},
                "inspect": false
              },
              "mappings": [],
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}
            },
            "overrides": [
              {
                "matcher": {"id": "byName", "options": "Value"},
                "properties": [
                  {"id": "displayName", "value": "Event Count"},
                  {
                    "id": "custom.cellOptions",
                    "value": {"mode": "basic", "type": "color-background"}
                  },
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        {"color": "green", "value": null},
                        {"color": "yellow", "value": 1},
                        {"color": "red", "value": 10}
                      ]
                    }
                  }
                ]
              }
            ]
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12},
          "id": 5,
          "options": {
            "cellHeight": "sm",
            "footer": {
              "countRows": false,
              "fields": "",
              "reducer": ["sum"],
              "show": false
            },
            "showHeader": true,
            "sortBy": [{"desc": true, "displayName": "Event Count"}]
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "crusoe-metrics"},
              "expr": "sum by (node, gpu) (increase(DCGM_FI_DEV_ECC_DBE_VOL_TOTAL[24h])) > 0",
              "instant": true,
              "legendFormat": "ECC DBE {{node}} GPU {{gpu}}",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "crusoe-metrics"},
              "expr": "sum by (node, gpu) (increase(DCGM_FI_DEV_CLOCK_THROTTLE_REASONS[24h])) > 0",
              "instant": true,
              "legendFormat": "Throttle {{node}} GPU {{gpu}}",
              "refId": "B"
            }
          ],
          "title": "DCGM Health Failures (Last 24h)",
          "transformations": [
            {
              "id": "labelsToFields",
              "options": {"mode": "columns"}
            }
          ],
          "type": "table"
        }
      ],
      "refresh": "5m",
