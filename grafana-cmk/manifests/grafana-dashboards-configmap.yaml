                "lineInterpolation": "linear",
                "showPoints": "never",
                "spanNulls": false,
                "stacking": {
                  "mode": "none"
                }
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "crusoe-metrics"
              },
              "expr": "avg by (vm_name) (DCGM_FI_PROF_PIPE_TENSOR_ACTIVE{cluster_id=~\"$cluster\"})",
              "legendFormat": "{{vm_name}}"
            }
          ]
        },
        {
          "id": 19,
          "type": "table",
          "title": "Top GPUs by Lifetime Uncorrectable ECC (DBE)",
          "description": "Each row is one GPU with a non-zero `DCGM_FI_DEV_ECC_DBE_AGG_TOTAL` counter \u2014 the lifetime tally of double-bit (uncorrectable) ECC errors since the GPU was first powered on. Unlike correctable (SBE) errors, which DCGM transparently fixes, double-bit errors mean two flipped bits in the same 64-bit word: NOT recoverable, may cause silent data corruption or a hard Xid 48/63/64. Any GPU on this leaderboard has a history of suspect HBM and should be considered a candidate for extra scrutiny, exclusion from precision-critical workloads, or RMA if the count keeps growing. The Active SBE / 24h SBE Volatile stats above tell you about ongoing correctable activity; this table tells you about past hardware faults that already happened.",
          "datasource": {
            "type": "prometheus",
            "uid": "crusoe-metrics"
          },
          "gridPos": {
            "x": 0,
            "y": 25,
            "w": 24,
            "h": 10
          },
