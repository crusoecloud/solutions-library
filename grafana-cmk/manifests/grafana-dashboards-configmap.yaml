            {
              "datasource": {
                "type": "prometheus",
                "uid": "crusoe-metrics"
              },
              "expr": "topk(20, sum by (vm_name, gpu) (DCGM_FI_DEV_ECC_DBE_AGG_TOTAL{cluster_id=~\"$cluster\"})) > 0",
              "format": "table",
