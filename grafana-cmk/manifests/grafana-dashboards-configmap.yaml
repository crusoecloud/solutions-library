                },
                "indexByName": {
                  "vm_name": 0,
                  "gpu": 1,
                  "Value": 2
                }
              }
            }
          ]
        },
        {
          "id": 20,
          "type": "table",
          "title": "Reset Candidates (heuristic: heavy SBE + remapped rows)",
          "description": "Heuristic 'GPUs that may benefit from a reset' leaderboard. Each row is a GPU that meets BOTH conditions simultaneously: (1) more than 100 single-bit ECC corrections in the last 24h, AND (2) at least one HBM row already remapped by DCGM. The conjunction matters \u2014 a high SBE rate by itself is just a busy die, and remapped rows by themselves are a stable retired-page state. The combination implies a die that is actively correcting hard while also having already exhausted some replacement pages, suggesting the page-pool is under pressure. A GPU reset re-arms DCGM's remap budget; consider draining the workload off the node and rebooting it, then re-checking this table. Caveat: the canonical 'pending remap' signal (`DCGM_FI_DEV_ROW_REMAP_PENDING`, DCGM field 393) is NOT currently collected by the Crusoe Watch Agent; this is a proxy heuristic, not a direct measurement. Value column shows the 24h SBE count, sorted descending. Empty / 'No data' is the healthy state.",
          "datasource": {
            "type": "prometheus",
            "uid": "crusoe-metrics"
          },
