              "mode": "multi",
              "sort": "desc"
            },
            "legend": {
              "showLegend": true,
              "displayMode": "table",
              "placement": "bottom",
              "calcs": [
                "mean",
                "max"
              ]
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "drawStyle": "line",
