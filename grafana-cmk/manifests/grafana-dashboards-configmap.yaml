apiVersion: v1
data:
  cluster-gpu-overview.json: |
    {
      "__inputs": [
        {
          "name": "DS_PROMETHEUS",
          "label": "Crusoe Metrics",
          "description": "Crusoe Metrics Prometheus-compatible endpoint",
          "type": "datasource",
          "pluginId": "prometheus",
          "pluginName": "Prometheus"
        }
      ],
      "__elements": {},
      "__requires": [
        {"type": "grafana", "id": "grafana", "name": "Grafana", "version": "11.0.0"},
        {"type": "datasource", "id": "prometheus", "name": "Prometheus", "version": "1.0.0"},
        {"type": "panel", "id": "stat", "name": "Stat", "version": ""},
        {"type": "panel", "id": "gauge", "name": "Gauge", "version": ""},
        {"type": "panel", "id": "timeseries", "name": "Time series", "version": ""},
        {"type": "panel", "id": "bargauge", "name": "Bar gauge", "version": ""}
      ],
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {"type": "grafana", "uid": "-- Grafana --"},
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "description": "Cluster-wide GPU utilization, memory, and power across all nodes in a Crusoe CMK or Managed Slurm cluster. Data sourced from Crusoe Metrics.",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "crusoe-metrics"},
          "description": "Total number of GPU time series currently reporting. One time series per GPU device.",
          "fieldConfig": {
            "defaults": {
              "color": {"fixedColor": "blue", "mode": "fixed"},
              "mappings": [],
              "thresholds": {"mode": "absolute", "steps": [{"color": "blue", "value": null}]},
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 4, "x": 0, "y": 0},
          "id": 1,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto",
            "wideLayout": true
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "crusoe-metrics"},
              "expr": "count(DCGM_FI_DEV_GPU_UTIL{cluster_id=~\"$cluster\"})",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "title": "Total GPUs",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "crusoe-metrics"},
          "description": "Number of distinct nodes reporting GPU metrics.\n\nThe 'node' label is the standard Prometheus scrape target label; it represents the node hostname as set by the Crusoe Watch Agent. If the variable dropdown is empty, check what labels are present on DCGM_FI_DEV_GPU_UTIL by running the scrape discovery curl in the Troubleshooting section.",
          "fieldConfig": {
            "defaults": {
              "color": {"fixedColor": "blue", "mode": "fixed"},
              "mappings": [],
              "thresholds": {"mode": "absolute", "steps": [{"color": "blue", "value": null}]},
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 4, "x": 4, "y": 0},
          "id": 2,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto",
            "wideLayout": true
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "crusoe-metrics"},
              "expr": "count(count by (node) (DCGM_FI_DEV_GPU_UTIL{cluster_id=~\"$cluster\"}))",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "title": "GPU Nodes",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "crusoe-metrics"},
          "description": "Current cluster-wide average GPU utilization across all GPUs and all nodes.",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "max": 100,
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 70},
                  {"color": "red", "value": 90}
                ]
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 8, "x": 8, "y": 0},
          "id": 3,
          "options": {
            "minVizHeight": 75,
            "minVizWidth": 75,
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "crusoe-metrics"},
              "expr": "avg(DCGM_FI_DEV_GPU_UTIL{cluster_id=~\"$cluster\"})",
              "instant": true,
              "legendFormat": "Avg",
              "refId": "A"
            }
          ],
          "title": "Cluster Avg GPU Utilization",
          "type": "gauge"
        },
        {
          "datasource": {"type": "prometheus", "uid": "crusoe-metrics"},
          "description": "GPU utilization over time, averaged per node (by node label).",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "none",
                "hideFrom": {"legend": false, "tooltip": false, "viz": false},
                "insertNulls": false,
                "lineInterpolation": "linear",
                "lineWidth": 1,
                "pointSize": 5,
                "scaleDistribution": {"type": "linear"},
                "showPoints": "never",
                "spanNulls": true,
                "stacking": {"group": "A", "mode": "none"},
                "thresholdsStyle": {"mode": "off"}
              },
              "mappings": [],
              "max": 100,
              "min": 0,
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]},
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 8},
          "id": 4,
          "options": {
            "legend": {
              "calcs": ["mean", "max", "lastNotNull"],
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "crusoe-metrics"},
              "expr": "avg by (node) (DCGM_FI_DEV_GPU_UTIL{cluster_id=~\"$cluster\"})",
              "legendFormat": "{{node}}",
              "refId": "A"
            }
          ],
          "title": "GPU Utilization by Node",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "crusoe-metrics"},
          "description": "Cluster-wide GPU framebuffer memory used (stacked) vs total capacity (dashed red line). DCGM_FI_DEV_FB_USED and DCGM_FI_DEV_FB_FREE are reported in MiB.",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 20,
                "gradientMode": "none",
                "hideFrom": {"legend": false, "tooltip": false, "viz": false},
                "insertNulls": false,
                "lineInterpolation": "linear",
                "lineWidth": 1,
                "pointSize": 5,
                "scaleDistribution": {"type": "linear"},
                "showPoints": "never",
                "spanNulls": true,
                "stacking": {"group": "A", "mode": "normal"},
                "thresholdsStyle": {"mode": "off"}
              },
              "mappings": [],
              "min": 0,
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]},
              "unit": "mebibytes"
            },
            "overrides": [
              {
                "matcher": {"id": "byName", "options": "Total Capacity"},
                "properties": [
                  {"id": "custom.stacking", "value": {"mode": "none"}},
                  {"id": "custom.fillOpacity", "value": 0},
                  {"id": "custom.lineStyle", "value": {"dash": [10, 10], "fill": "dash"}},
                  {"id": "custom.lineWidth", "value": 2},
                  {"id": "color", "value": {"fixedColor": "red", "mode": "fixed"}}
                ]
              }
            ]
          },
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 16},
          "id": 5,
          "options": {
            "legend": {
              "calcs": ["mean", "max", "lastNotNull"],
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "crusoe-metrics"},
              "expr": "sum(DCGM_FI_DEV_FB_USED{cluster_id=~\"$cluster\"})",
              "legendFormat": "Used",
              "refId": "A"
            },
            {
              "datasource": {"type": "prometheus", "uid": "crusoe-metrics"},
              "expr": "sum(DCGM_FI_DEV_FB_USED{cluster_id=~\"$cluster\"} + DCGM_FI_DEV_FB_FREE{cluster_id=~\"$cluster\"})",
              "legendFormat": "Total Capacity",
              "refId": "B"
            }
          ],
          "title": "Cluster GPU Memory — Used vs Total",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "crusoe-metrics"},
          "description": "Total GPU power draw per node across the cluster. DCGM_FI_DEV_POWER_USAGE is reported in watts.",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "none",
                "hideFrom": {"legend": false, "tooltip": false, "viz": false},
                "insertNulls": false,
                "lineInterpolation": "linear",
                "lineWidth": 1,
                "pointSize": 5,
                "scaleDistribution": {"type": "linear"},
                "showPoints": "never",
                "spanNulls": true,
                "stacking": {"group": "A", "mode": "none"},
                "thresholdsStyle": {"mode": "off"}
              },
              "mappings": [],
              "min": 0,
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]},
              "unit": "watt"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 24},
          "id": 6,
          "options": {
            "legend": {
              "calcs": ["mean", "max", "lastNotNull"],
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "crusoe-metrics"},
              "expr": "sum by (node) (DCGM_FI_DEV_POWER_USAGE{cluster_id=~\"$cluster\"})",
              "legendFormat": "{{node}}",
              "refId": "A"
            }
          ],
          "title": "GPU Power Draw by Node",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "crusoe-metrics"},
          "description": "Top 10 nodes by current average GPU utilization. Useful for identifying hot nodes or underutilized capacity.\n\nTODO: Verify 'node' label name.",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "max": 100,
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 70},
                  {"color": "red", "value": 90}
                ]
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {"h": 10, "w": 24, "x": 0, "y": 32},
          "id": 7,
          "options": {
            "displayMode": "gradient",
            "minVizHeight": 10,
            "minVizWidth": 0,
            "namePlacement": "auto",
            "orientation": "horizontal",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "showUnfilled": true,
            "valueMode": "color"
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "crusoe-metrics"},
              "expr": "topk(10, avg by (node) (DCGM_FI_DEV_GPU_UTIL{cluster_id=~\"$cluster\"}))",
              "instant": true,
              "legendFormat": "{{node}}",
              "refId": "A"
            }
          ],
          "title": "Top 10 Nodes by Avg GPU Utilization",
          "type": "bargauge"
        }
      ],
      "refresh": "1m",
      "schemaVersion": 39,
      "tags": ["crusoe", "gpu", "kubernetes"],
      "templating": {
        "list": [
          {
            "allValue": ".*",
            "current": {},
            "datasource": {"type": "prometheus", "uid": "crusoe-metrics"},
            "definition": "label_values(DCGM_FI_DEV_GPU_UTIL, cluster_id)",
            "hide": 0,
            "includeAll": true,
            "label": "Cluster",
            "multi": false,
            "name": "cluster",
            "options": [],
            "query": {
              "query": "label_values(DCGM_FI_DEV_GPU_UTIL, cluster_id)",
              "refId": "StandardVariableQuery"
            },
            "refresh": 2,
            "regex": "",
            "sort": 1,
            "type": "query"
          }
        ]
      },
      "time": {"from": "now-6h", "to": "now"},
      "timepicker": {},
      "timezone": "browser",
      "title": "Crusoe — Cluster GPU Overview",
      "uid": "crusoe-cluster-gpu-overview",
      "version": 1,
      "weekStart": ""
    }
  cluster-gpu-power.json: |
    {
      "__inputs": [
        {
          "name": "DS_PROMETHEUS",
          "label": "Crusoe Metrics",
          "description": "Crusoe Metrics Prometheus-compatible endpoint",
          "type": "datasource",
          "pluginId": "prometheus",
          "pluginName": "Prometheus"
        }
      ],
      "__elements": {},
      "__requires": [
        {"type": "grafana", "id": "grafana", "name": "Grafana", "version": "11.0.0"},
        {"type": "datasource", "id": "prometheus", "name": "Prometheus", "version": "1.0.0"},
        {"type": "panel", "id": "stat", "name": "Stat", "version": ""},
        {"type": "panel", "id": "timeseries", "name": "Time series", "version": ""},
        {"type": "panel", "id": "bargauge", "name": "Bar gauge", "version": ""}
      ],
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": {"type": "grafana", "uid": "-- Grafana --"},
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "description": "Aggregate GPU power draw and energy consumption across the cluster. Data sourced from Crusoe Metrics (DCGM_FI_DEV_POWER_USAGE in watts; DCGM_FI_DEV_TOTAL_ENERGY_CONSUMPTION in millijoules cumulative). H100 SXM5 TDP is 700 W per GPU.",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [
        {
          "asDropdown": false,
          "icon": "arrow-left",
          "includeVars": false,
          "keepTime": true,
          "tags": ["crusoe", "gpu"],
          "targetBlank": false,
          "title": "Cluster GPU Overview",
          "tooltip": "",
          "type": "dashboards",
          "url": ""
        }
      ],
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "crusoe-metrics"},
          "description": "Total instantaneous GPU power draw across all nodes in the cluster. Sum of DCGM_FI_DEV_POWER_USAGE for all GPUs matching the selected cluster.",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 5600},
                  {"color": "red", "value": 8960}
                ]
              },
              "unit": "watt"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "id": 1,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto",
            "wideLayout": true
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "crusoe-metrics"},
              "expr": "sum(DCGM_FI_DEV_POWER_USAGE{cluster_id=~\"$cluster\"})",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "title": "Total Cluster Power",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "crusoe-metrics"},
          "description": "Average instantaneous power draw per GPU across the cluster. H100 SXM5 TDP is 700 W; sustained workloads typically draw 400–650 W per GPU.",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 350},
                  {"color": "red", "value": 560}
                ]
              },
              "unit": "watt"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
          "id": 2,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto",
            "wideLayout": true
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "crusoe-metrics"},
              "expr": "avg(DCGM_FI_DEV_POWER_USAGE{cluster_id=~\"$cluster\"})",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "title": "Avg Power per GPU",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "crusoe-metrics"},
          "description": "Peak total cluster power draw observed within the selected time range.",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 5600},
                  {"color": "red", "value": 8960}
                ]
              },
              "unit": "watt"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0},
          "id": 3,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["max"], "fields": "", "values": false},
            "textMode": "auto",
            "wideLayout": true
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "crusoe-metrics"},
              "expr": "sum(DCGM_FI_DEV_POWER_USAGE{cluster_id=~\"$cluster\"})",
              "instant": false,
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "title": "Peak Power (Time Range)",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "crusoe-metrics"},
          "description": "Total GPU energy consumed across the cluster during the selected time range. Derived from DCGM_FI_DEV_TOTAL_ENERGY_CONSUMPTION (cumulative millijoules) using increase() over the dashboard range.\n\nFormula: increase(mJ) ÷ 3.6×10⁹ = kWh",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "fixed", "fixedColor": "blue"},
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [{"color": "blue", "value": null}]
              },
              "unit": "kwatth"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0},
          "id": 4,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "textMode": "auto",
            "wideLayout": true
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "crusoe-metrics"},
              "expr": "sum(increase(DCGM_FI_DEV_TOTAL_ENERGY_CONSUMPTION{cluster_id=~\"$cluster\"}[$__range])) / 3600000000",
              "instant": true,
              "legendFormat": "",
              "refId": "A"
            }
          ],
          "title": "Energy Consumed (Time Range)",
          "type": "stat"
        },
        {
          "datasource": {"type": "prometheus", "uid": "crusoe-metrics"},
          "description": "Total GPU power draw across the entire cluster over time. The dashed threshold line at 11,200 W represents 100% TDP for 16× H100 SXM5 GPUs (700 W each). Adjust if your node count or GPU model differs.",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 15,
                "gradientMode": "none",
                "hideFrom": {"legend": false, "tooltip": false, "viz": false},
                "insertNulls": false,
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 5,
                "scaleDistribution": {"type": "linear"},
                "showPoints": "never",
                "spanNulls": true,
                "stacking": {"group": "A", "mode": "none"},
                "thresholdsStyle": {"mode": "dashed"}
              },
              "mappings": [],
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "red", "value": 11200}
                ]
              },
              "unit": "watt"
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 4},
          "id": 5,
          "options": {
            "legend": {
              "calcs": ["mean", "max", "lastNotNull"],
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {"mode": "multi", "sort": "desc"}
          },
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "crusoe-metrics"},
              "expr": "sum(DCGM_FI_DEV_POWER_USAGE{cluster_id=~\"$cluster\"})",
              "legendFormat": "Total",
              "refId": "A"
            }
          ],
          "title": "Total Cluster Power over Time",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "crusoe-metrics"},
