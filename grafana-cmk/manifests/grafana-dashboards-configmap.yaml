            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "mappings": [
                {
                  "options": {
                    "0": {
                      "color": "green",
                      "index": 0,
                      "text": "0 \u2014 Clean"
                    }
                  },
                  "type": "value"
                }
              ],
