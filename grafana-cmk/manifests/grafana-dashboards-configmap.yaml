  node-ib-detail.json: |-
    {
      "uid": "crusoe-ib-node",
      "title": "Crusoe \u2014 InfiniBand Node View",
      "description": "Per-HCA InfiniBand detail for selected nodes. All panels use [1h] rate windows due to the slow IB scrape cadence; see README for details.",
      "tags": [
        "crusoe",
        "infiniband",
        "node"
      ],
      "schemaVersion": 38,
      "version": 1,
      "refresh": "1m",
      "time": {
        "from": "now-3h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "cluster",
            "label": "Cluster",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "crusoe-metrics"
            },
            "query": "label_values(crusoe_ib_port_throughput_rx, cluster_id)",
            "refresh": 1,
            "sort": 1,
            "multi": false,
            "includeAll": true,
            "allValue": ".+",
            "current": {
              "text": "All",
              "value": "$__all",
              "selected": true
            }
          },
          {
            "name": "node",
            "label": "Node",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "crusoe-metrics"
            },
            "query": "label_values(crusoe_ib_port_throughput_rx{cluster_id=~\"$cluster\"}, vm_name)",
            "refresh": 1,
            "sort": 1,
            "multi": true,
            "includeAll": true,
            "allValue": ".+",
            "current": {
              "text": "All",
              "value": "$__all",
              "selected": true
            }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Selected Nodes RX",
          "description": "Aggregate RX bandwidth across the selected nodes. \u00b7 Window is fixed at [1h] because the Watch Agent's IB scrape cadence is ~19 min on B200 / ~4.5 min on H100; shorter windows would render mostly NaN. The reading is a trailing-hour average.",
          "datasource": {
            "type": "prometheus",
            "uid": "crusoe-metrics"
          },
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 6,
            "h": 4
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "crusoe-metrics"
              },
              "expr": "(sum(rate(crusoe_ib_port_throughput_rx{cluster_id=~\"$cluster\", vm_name=~\"$node\"}[1h])) / 8) or vector(0)",
              "instant": true,
              "legendFormat": "__auto"
            }
          ]
        },
        {
          "id": 2,
          "type": "stat",
